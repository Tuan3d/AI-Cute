<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Ngăn trình duyệt cache HTML -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Công Cụ Lách Đạo Văn</title>
    <link rel="stylesheet" href="style-css.css?v=1.0.1">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Công Cụ Lách Đạo Văn</h1>
            <p>Công cụ chống phát hiện đạo văn</p>
        </div>

        <div class="form-group">
            <label for="custom-key">Ẩn key:</label>
            <div class="toggle-wrapper">
                <label class="toggle-label">Ẩn key</label>
                <label class="toggle">
                    <input type="checkbox" id="show-key">
                    <span class="slider"></span>
                </label>
                <span class="toggle-text">Ẩn</span>
            </div>
            <input type="password" id="custom-key" placeholder="Nhập key của bạn">
        </div>

        <div class="form-group">
            <label for="original-text">Văn bản gốc:</label>
            <textarea id="original-text" placeholder="Nhập văn bản cần chuyển đổi"></textarea>
        </div>

        <button class="btn" id="rewrite-btn"><i class="fas fa-sync-alt"></i> Chuyển đổi văn bản</button>

        <div class="result-section" id="result-section">
            <div class="result-header">
                <h2 class="result-title">Kết quả:</h2>
                <button class="copy-btn" id="copy-btn">Sao chép</button>
            </div>
            <div class="result-content" id="result-content"></div>
        </div>
    </div>

    <div class="footer">
        <p>© 2025 | AnhTuan-Studio</p>
        <p class="contact-info">Số điện thoại Zalo,Tele: 0375320855</p>
    </div>

    <div class="contact-buttons">
        <div class="contact-btn zalo-btn" id="zalo-btn">
            <img src="zalo-icon.png?v=1.0.1" alt="Zalo">
        </div>
        <div class="contact-btn telegram-btn" id="telegram-btn">
            <img src="telegram-icon.png?v=1.0.1" alt="Telegram">
        </div>
    </div>

    <div class="telegram-modal" id="telegram-modal">
        <div class="modal-content">
            <p>Số điện thoại Zalo,Tele: 0375320855</p>
            <button class="close-btn" id="close-btn">Đóng</button>
        </div>
    </div>

    <div class="spinner-overlay" id="spinner-overlay">
        <div class="spinner"></div>
        <div class="spinner-message">Đang chuyển đổi văn bản...</div>
        <div class="ad-message">Cảm ơn bạn đã sử dụng!</div>
    </div>

    <script src="keys-js.js?v=1.0.1"></script>
    <script src="script-js.js?v=1.0.1"></script>
    <!-- Đăng ký Service Worker -->
    <script>
        // Đăng ký Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js?v=1.0.1')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }

        // Động lực query string versioning
        const version = '1.0.1';
        document.querySelectorAll('link[href], script[src], img[src]').forEach(el => {
            const src = el.getAttribute('src') || el.getAttribute('href');
            if (src && !src.includes('v=')) {
                el.setAttribute(src.includes('src') ? 'src' : 'href', `${src}?v=${version}`);
            }
        });
    </script>
</body>
</html>
