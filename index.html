<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Công Cụ Lách Đạo Văn</title>
    <link rel="stylesheet" id="css-link" href="style-css.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Công Cụ Lách Đạo Văn</h1>
            <p>Công cụ chống phát hiện đạo văn</p>
        </div>

        <div class="form-group">
            <div class="toggle-wrapper">
                <label class="toggle-label" for="show-key">Ẩn key:</label>
                <label class="toggle">
                    <input type="checkbox" id="show-key">
                    <span class="slider"></span>
                    <span class="toggle-text">Ẩn</span>
                </label>
            </div>
            <input type="password" id="custom-key" placeholder="Nhập key của bạn...">
        </div>

        <div class="form-group">
            <label for="original-text">Văn bản gốc:</label>
            <textarea id="original-text" placeholder="Nhập văn bản cần chuyển đổi..."></textarea>
        </div>

        <button class="btn" id="rewrite-btn">
            Chuyển đổi văn bản
        </button>

        <div class="result-section" id="result-section">
            <div class="result-header">
                <h2 class="result-title">Kết quả:</h2>
                <button class="copy-btn" id="copy-btn">Sao chép</button>
            </div>
            <div class="result-content" id="result-content"></div>
        </div>
    </div>

    <div class="footer">
        © 2025 | AnhTuan-Studio
        <div class="contact-info">
            Số điện thoại Zalo,Tele: 0375320855
        </div>
    </div>

    <div class="contact-buttons">
        <div class="contact-btn zalo-btn" id="zalo-btn">
            <img src="https://i.supaimg.com/ede3b0da-b101-4da4-a918-96771f6cd220.png" alt="Zalo">
        </div>
        <div class="contact-btn telegram-btn" id="telegram-btn">
            <img src="https://i.supaimg.com/458adba6-ec6c-4295-80f8-5ba0954fdb75.png" alt="Telegram">
        </div>
    </div>

    <div class="telegram-modal" id="telegram-modal">
        <div class="modal-content">
            <p>Số điện thoại Zalo,Tele: 0375320855</p>
            <button class="close-btn" id="close-btn">Đóng</button>
        </div>
    </div>

    <div class="spinner-overlay" id="spinner-overlay">
        <div class="spinner"></div>
        <div class="spinner-message">Đang chuyển đổi văn bản...</div>
        <div class="ad-message">Cảm ơn bạn đã sử dụng!</div>
    </div>

    <script>
        const timestamp = new Date().getTime();
        
        const cssLink = document.getElementById('css-link');
        cssLink.href = `style-css.css?t=${timestamp}`;
        
        const keysScript = document.createElement('script');
        keysScript.src = `keys-js.js?t=${timestamp}`;
        document.body.appendChild(keysScript);
        
        const mainScript = document.createElement('script');
        mainScript.src = `script-js.js?t=${timestamp}`;
        document.body.appendChild(mainScript);
    </script>
</body>
</html>
